x-backend-build: &backend-build
  context: ./backend
  dockerfile: Dockerfile
  target: runtime

services:
  postgres:
    image: postgres:16-alpine
    container_name: challenge-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_EXTERNAL_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend-migrate:
    image: challenge-full-stack-backend:local
    pull_policy: never
    build: *backend-build
    environment: &backend-env
      NODE_ENV: ${NODE_ENV}
      PORT: ${BACKEND_PORT}
      DB_TYPE: ${DB_TYPE}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_SCHEMA: ${DB_SCHEMA}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["pnpm", "migration:run:prod"]
    restart: "no"

  backend-seed:
    image: challenge-full-stack-backend:local
    pull_policy: never
    build: *backend-build
    environment: *backend-env
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
    command: ["pnpm", "seed:run:prod"]
    restart: "no"

  backend:
    image: challenge-full-stack-backend:local
    pull_policy: never
    build: *backend-build
    environment: *backend-env
    depends_on:
      backend-seed:
        condition: service_completed_successfully
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    restart: unless-stopped

  frontend:
    image: challenge-full-stack-frontend:local
    pull_policy: never
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT}:80"
    restart: unless-stopped

volumes:
  postgres-data:
